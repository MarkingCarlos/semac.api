spring.application.name=java_api

spring.datasource.url=jdbc:postgresql://localhost:5432/semac2026
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true

# Segredo do JWT (HS256). Em produção, defina a env JWT_SECRET com >=32 chars.
# O valor abaixo é apenas para desenvolvimento.
jwt.secret=${JWT_SECRET:dev-semac-2026-troque-este-segredo-em-producao-32+}
